<div class="settings-page">
  <div class="settings-header">
    <p class="settings-subtitle">Activá o desactivá los métodos de pago disponibles en el checkout de MercadoPago</p>
  </div>

  @if (loading()) {
    <div class="loading-center">
      <mat-spinner diameter="40" />
    </div>
  } @else {
    <mat-card class="methods-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>payments</mat-icon>
          Métodos de pago
        </mat-card-title>
        @if (saving()) {
          <mat-spinner diameter="18" class="saving-spinner" />
        }
      </mat-card-header>

      <mat-card-content>
        @for (method of methods(); track method.id; let last = $last) {
          <div class="method-row">
            <mat-icon class="method-icon">{{ method.icon }}</mat-icon>
            <div class="method-info">
              <span class="method-label">{{ method.label }}</span>
              <span class="method-description">{{ method.description }}</span>
            </div>
            <mat-slide-toggle
              [checked]="method.enabled"
              (change)="toggle(method.id)"
              [class.toggle--on]="method.enabled"
              [class.toggle--off]="!method.enabled"
            />
          </div>
          @if (!last) {
            <mat-divider />
          }
        }
      </mat-card-content>
    </mat-card>
  }
</div>
