info:
  name: Participants - POST add external
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/trips/:tripId/participants'
  params:
    - name: tripId
      value: '{{tripId}}'
      type: path
  body:
    type: json
    data: |-
      {
        "type": "external",
        "externalName": "Juan Carlos García",
        "externalDni": "12345678",
        "externalRole": "Padre de Martín García",
        "status": "confirmed",
        "costAssigned": 45000
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
